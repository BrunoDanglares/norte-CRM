# O EasyPanel builda este app com Nixpacks (não com o Dockerfile). O Instaflix usa um
# navegador headless (Puppeteer) pra ler sites SPA (preços/planos reais). Instalamos o
# Chromium do Debian via APT (binário leve e confiável — o pacote nix de chromium é pesado
# e instável no build) e PULAMOS o download do Chromium bundled do puppeteer (ver
# .puppeteerrc.cjs). O código resolve o binário em runtime (siteRenderer.acharChromium →
# /usr/bin/chromium ou PATH). Bruno 2026-07-10.
[phases.setup]
aptPkgs = ["chromium", "ca-certificates", "fonts-liberation"]

[variables]
PUPPETEER_SKIP_DOWNLOAD = "true"
