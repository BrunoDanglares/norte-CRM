# Chromium via NIX (binário self-contained que RODA dentro de container). O pacote
# `chromium` do apt no Ubuntu 24.04 (noble) é só um atalho pro SNAP — e snap não funciona
# em container. O Nix instala um chromium real; o puppeteer não baixa o bundled (.npmrc
# puppeteer_skip_download) e o código resolve o binário do Nix em runtime via PATH
# (siteRenderer.acharChromium → `command -v chromium`). Node fixado em 22 (.nvmrc). Bruno 2026-07-11.
[phases.setup]
nixPkgs = ["...", "chromium"]
